<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings · evot</title>
    <style>
      :root {
        --background: 213 23% 10%;
        --foreground: 214 32% 91%;
        --card: 222 26% 15%;
        --muted: 219 25% 18%;
        --primary: 142 69% 58%;
        --secondary: 219 25% 18%;
        --muted-foreground: 219 13% 54%;
        --border: 218 23% 23%;
        --danger: 0 72% 71%;
        --warn: 213 94% 68%;
        --radius: 0.75rem;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        --sans: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: var(--sans);
        background:
          radial-gradient(1200px 600px at 80% -10%, hsl(var(--primary) / 0.06), transparent 60%),
          hsl(var(--background));
        color: hsl(var(--foreground));
        -webkit-font-smoothing: antialiased;
      }

      /* Top bar */
      .topbar {
        position: sticky; top: 0; z-index: 20;
        backdrop-filter: blur(10px);
        background: hsl(var(--background) / 0.82);
        border-bottom: 1px solid hsl(var(--border));
      }
      .topbar-inner {
        max-width: 1080px; margin: 0 auto; padding: 16px 28px;
        display: flex; align-items: center; gap: 14px;
      }
      .brand { display: flex; align-items: center; gap: 10px; }
      .brand .gear { font-size: 20px; color: hsl(var(--primary)); }
      .brand .title { font-size: 16px; font-weight: 650; letter-spacing: -0.01em; }
      .brand .crumb { color: hsl(var(--muted-foreground)); font-size: 13px; }
      .topbar-spacer { flex: 1; }
      .ghost-link {
        display: inline-flex; align-items: center; gap: 6px;
        color: hsl(var(--muted-foreground)); text-decoration: none;
        font-size: 13px; padding: 7px 12px; border-radius: 9px;
        border: 1px solid transparent; transition: all .14s;
      }
      .ghost-link:hover { color: hsl(var(--foreground)); border-color: hsl(var(--border)); }

      /* Layout */
      .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 28px 140px; }
      .pageintro { margin-bottom: 26px; }
      .pageintro h1 { font-size: 26px; font-weight: 680; margin: 0 0 6px; letter-spacing: -0.02em; }
      .pageintro p { color: hsl(var(--muted-foreground)); font-size: 14px; margin: 0; }
      .pageintro code {
        font-family: var(--mono); font-size: 12.5px;
        color: hsl(var(--primary)); background: hsl(var(--primary) / 0.1);
        padding: 2px 7px; border-radius: 6px;
      }

      .card {
        background: hsl(var(--card) / 0.7);
        border: 1px solid hsl(var(--border));
        border-radius: var(--radius);
        padding: 26px 28px;
        margin-bottom: 22px;
        box-shadow: 0 1px 0 hsl(0 0% 100% / 0.02) inset;
      }
      .card-head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 20px; }
      .card-head .eyebrow {
        font-size: 11px; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.08em; color: hsl(var(--primary));
      }
      .card-head h2 { font-size: 17px; font-weight: 620; margin: 0; }
      .card-head .desc { color: hsl(var(--muted-foreground)); font-size: 13px; }

      /* Form controls */
      .grid { display: grid; gap: 18px 20px; }
      .grid.cols-2 { grid-template-columns: 1fr 1fr; }
      @media (max-width: 680px) { .grid.cols-2 { grid-template-columns: 1fr; } }
      .field { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
      .field > label { font-size: 12.5px; font-weight: 560; color: hsl(var(--foreground)); }
      .field .help { font-size: 11.5px; color: hsl(var(--muted-foreground)); }
      input, select {
        width: 100%; height: 42px;
        background: hsl(var(--background) / 0.6);
        border: 1px solid hsl(var(--border));
        color: hsl(var(--foreground));
        border-radius: 10px; padding: 0 13px;
        font-size: 13.5px; font-family: var(--mono);
        transition: border-color .14s, box-shadow .14s, background .14s;
      }
      select { font-family: var(--sans); cursor: pointer; }
      input::placeholder { color: hsl(var(--muted-foreground) / 0.7); }
      input:focus, select:focus {
        outline: none;
        border-color: hsl(var(--primary) / 0.6);
        box-shadow: 0 0 0 3px hsl(var(--primary) / 0.12);
        background: hsl(var(--background) / 0.85);
      }

      /* Provider blocks */
      .providers-stack { display: flex; flex-direction: column; gap: 16px; margin-top: 6px; }
      .provider {
        border: 1px solid hsl(var(--border));
        border-radius: 12px; padding: 20px 22px;
        background: hsl(var(--background) / 0.35);
        transition: border-color .14s;
      }
      .provider:hover { border-color: hsl(var(--border) / 1.4); }
      .provider.active-prov { border-color: hsl(var(--primary) / 0.5); box-shadow: 0 0 0 1px hsl(var(--primary) / 0.2); }
      .provider-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
      .provider-head .pname { font-family: var(--mono); font-weight: 700; font-size: 14px; }
      .badge {
        font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
        padding: 3px 9px; border-radius: 999px;
        background: hsl(var(--primary) / 0.14); color: hsl(var(--primary));
        border: 1px solid hsl(var(--primary) / 0.3);
      }
      .badge.dim { background: hsl(var(--muted) / 0.5); color: hsl(var(--muted-foreground)); border-color: hsl(var(--border)); }
      .provider-head .spacer { flex: 1; }

      /* Buttons */
      .btn {
        font-size: 13px; font-weight: 560; font-family: var(--sans);
        padding: 0 16px; height: 40px; border-radius: 10px;
        border: 1px solid hsl(var(--border)); background: hsl(var(--secondary));
        color: hsl(var(--foreground)); cursor: pointer;
        display: inline-flex; align-items: center; gap: 7px;
        transition: all .14s;
      }
      .btn:hover { border-color: hsl(var(--primary) / 0.5); transform: translateY(-1px); }
      .btn.primary { background: hsl(var(--primary)); color: hsl(var(--background)); border-color: hsl(var(--primary)); font-weight: 650; }
      .btn.primary:hover { box-shadow: 0 6px 20px hsl(var(--primary) / 0.28); }
      .btn.ghost { background: transparent; }
      .btn.danger { background: transparent; color: hsl(var(--danger)); border-color: transparent; padding: 0 10px; }
      .btn.danger:hover { background: hsl(var(--danger) / 0.12); border-color: hsl(var(--danger) / 0.4); transform: none; }
      .btn.small { height: 32px; font-size: 12px; padding: 0 11px; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

      /* Secret input with reveal */
      .secret { position: relative; }
      .secret input { padding-right: 44px; }
      .secret .reveal {
        position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
        height: 30px; width: 32px; border: none; background: transparent;
        color: hsl(var(--muted-foreground)); cursor: pointer; border-radius: 7px;
        display: inline-flex; align-items: center; justify-content: center; font-size: 14px;
      }
      .secret .reveal:hover { color: hsl(var(--foreground)); background: hsl(var(--secondary)); }

      /* Toggle switch */
      .switch-row { display: flex; align-items: center; gap: 12px; }
      .switch { position: relative; width: 42px; height: 24px; flex-shrink: 0; }
      .switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
      .switch .track {
        position: absolute; inset: 0; border-radius: 999px;
        background: hsl(var(--muted)); border: 1px solid hsl(var(--border)); transition: background .16s;
      }
      .switch .track::after {
        content: ""; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
        border-radius: 50%; background: hsl(var(--muted-foreground)); transition: transform .16s, background .16s;
      }
      .switch input:checked + .track { background: hsl(var(--primary) / 0.4); border-color: hsl(var(--primary) / 0.6); }
      .switch input:checked + .track::after { transform: translateX(18px); background: hsl(var(--primary)); }

      /* Sticky action bar */
      .actionbar {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
        background: linear-gradient(transparent, hsl(var(--background)) 42%);
        padding: 28px 0 18px;
      }
      .actionbar-inner {
        max-width: 1080px; margin: 0 auto; padding: 0 28px;
        display: flex; align-items: center; gap: 14px;
      }
      .toast { font-size: 13.5px; display: inline-flex; align-items: center; gap: 8px; }
      .toast.ok { color: hsl(var(--primary)); }
      .toast.err { color: hsl(var(--danger)); }
      .toast.warn { color: hsl(var(--warn)); }
      .toast .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
      .actionbar-spacer { flex: 1; }
      .loading { color: hsl(var(--muted-foreground)); font-size: 14px; padding: 40px 0; text-align: center; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="gear">⚙</span>
          <span class="title">evot</span>
          <span class="crumb">/ Settings</span>
        </div>
        <div class="topbar-spacer"></div>
        <a class="ghost-link" href="/">← Back to dashboard</a>
      </div>
    </div>
    <div class="wrap">
      <div class="pageintro">
        <h1>Settings</h1>
        <p id="envpath">Configure your LLM provider and Feishu bot.</p>
      </div>
      <div id="root"><div class="loading">Loading settings…</div></div>
    </div>
    <div class="actionbar">
      <div class="actionbar-inner">
        <button class="btn primary" id="save">Save changes</button>
        <button class="btn ghost" id="addprovider">+ Add provider</button>
        <div class="actionbar-spacer"></div>
        <span class="toast" id="toast"></span>
      </div>
    </div>
    <script>
      let state = null;

      const $ = (id) => document.getElementById(id);
      const esc = (s) => String(s == null ? "" : s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

      function toast(msg, kind) {
        const t = $("toast");
        if (!msg) { t.textContent = ""; t.className = "toast"; return; }
        t.innerHTML = '<span class="dot"></span>' + esc(msg);
        t.className = "toast " + (kind || "");
      }

      function optionList(values, selected) {
        return values.map((v) =>
          `<option value="${esc(v)}"${v === selected ? " selected" : ""}>${esc(v)}</option>`
        ).join("");
      }

      function render() {
        $("envpath").innerHTML =
          "Configure your LLM provider and Feishu bot. Saved to <code>" +
          esc(state.env_file_path) + "</code>";
        const root = $("root");
        let html = "";

        // LLM card
        html += '<div class="card">';
        html += '<div class="card-head"><span class="eyebrow">LLM</span>' +
          '<h2>Model providers</h2>' +
          '<span class="desc">The first provider answers new messages.</span></div>';
        html += '<div class="providers-stack" id="providers"></div>';
        html += "</div>";

        // Feishu card
        const f = state.feishu || { app_id: "", app_secret_set: false, app_secret_hint: "", mention_only: true };
        const secretPh = f.app_secret_set
          ? esc(f.app_secret_hint) + " — leave blank to keep"
          : "not set";
        html += '<div class="card">';
        html += '<div class="card-head"><span class="eyebrow">Channel</span>' +
          '<h2>Feishu bot</h2>' +
          '<span class="desc">Connect a Feishu app to chat with evot.</span></div>';
        html += '<div class="grid cols-2">';
        html += '<div class="field"><label>App ID</label>' +
          '<input id="feishu_app_id" value="' + esc(f.app_id) + '" placeholder="cli_..." /></div>';
        html += '<div class="field"><label>App secret</label>' +
          '<div class="secret"><input id="feishu_app_secret" type="password" placeholder="' + secretPh + '" />' +
          '<button type="button" class="reveal" data-reveal="feishu_app_secret">\u{1F441}</button></div></div>';
        html += "</div>";
        html += '<div class="switch-row" style="margin-top:18px">' +
          '<span class="switch"><input type="checkbox" id="feishu_mention"' + (f.mention_only ? " checked" : "") +
          ' /><span class="track"></span></span>' +
          '<div class="field" style="gap:2px"><label style="cursor:pointer">Respond only when mentioned</label>' +
          '<span class="help">Feishu changes are saved now but apply after a server restart.</span></div></div>';
        html += "</div>";

        root.innerHTML = html;
        renderProviders();
        wireReveal();
      }

      function renderProviders() {
        const host = $("providers");
        host.innerHTML = state.providers.map((p, i) => {
          // The first provider is the default used for new messages.
          const isActive = i === 0;
          const keyState = p.api_key_set
            ? '<span class="badge">key set</span>'
            : '<span class="badge dim">no key</span>';
          const defaultBadge = isActive ? '<span class="badge">default</span>' : "";
          const keyPh = p.api_key_set ? esc(p.api_key_hint) + " — leave blank to keep" : "paste API key";
          const sid = "pkey_" + i;
          const moveUp = i > 0
            ? '<button class="btn ghost small" data-up="' + i + '" title="Make default">↑ Make default</button>'
            : "";
          return '<div class="provider' + (isActive ? " active-prov" : "") + '" data-i="' + i + '">' +
            '<div class="provider-head"><span class="pname">' + esc(p.name) + "</span>" + defaultBadge + keyState +
            '<span class="spacer"></span>' + moveUp +
            '<button class="btn danger small" data-del="' + i + '">Remove</button></div>' +
            '<div class="grid cols-2">' +
            '<div class="field"><label>Name</label><input class="p-name" value="' + esc(p.name) + '" /></div>' +
            '<div class="field"><label>Protocol</label><select class="p-protocol">' +
            optionList(state.protocols, p.protocol) + "</select></div>" +
            '<div class="field"><label>Base URL</label><input class="p-base" value="' + esc(p.base_url) + '" placeholder="https://..." /></div>' +
            '<div class="field"><label>API key</label><div class="secret">' +
            '<input class="p-key" id="' + sid + '" type="password" placeholder="' + keyPh + '" />' +
            '<button type="button" class="reveal" data-reveal="' + sid + '">\u{1F441}</button></div></div>' +
            '<div class="field"><label>Models</label><input class="p-models" value="' + esc(p.models.join(", ")) +
            '" placeholder="model-a, model-b" /><span class="help">Comma-separated. The first is the default.</span></div>' +
            '<div class="field"><label>Thinking level</label><select class="p-thinking">' +
            '<option value="">Use model default</option>' +
            optionList(state.thinking_levels, p.thinking_level || "") + "</select></div>" +
            "</div></div>";
        }).join("");

        host.querySelectorAll("[data-del]").forEach((btn) => {
          btn.addEventListener("click", () => {
            syncFromDom();
            state.providers.splice(Number(btn.dataset.del), 1);
            render();
          });
        });
        // Promote a provider to the front so it becomes the default.
        host.querySelectorAll("[data-up]").forEach((btn) => {
          btn.addEventListener("click", () => {
            syncFromDom();
            const idx = Number(btn.dataset.up);
            const [moved] = state.providers.splice(idx, 1);
            state.providers.unshift(moved);
            render();
          });
        });
      }

      // Toggle password visibility for any [data-reveal] button.
      function wireReveal() {
        document.querySelectorAll("[data-reveal]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const inp = $(btn.dataset.reveal);
            if (!inp) return;
            inp.type = inp.type === "password" ? "text" : "password";
          });
        });
      }
      // Read edited values back out of the DOM into `state.providers` so they
      // survive add/remove re-renders and the save payload.
      function syncFromDom() {
        const blocks = $("providers").querySelectorAll(".provider");
        blocks.forEach((el, i) => {
          const p = state.providers[i];
          if (!p) return;
          p.name = el.querySelector(".p-name").value.trim();
          p.protocol = el.querySelector(".p-protocol").value;
          p.base_url = el.querySelector(".p-base").value.trim();
          p.models = el.querySelector(".p-models").value
            .split(",").map((m) => m.trim()).filter(Boolean);
          p.thinking_level = el.querySelector(".p-thinking").value || null;
          const key = el.querySelector(".p-key").value;
          p._new_key = key.length ? key : null;
        });
      }

      function buildPayload() {
        syncFromDom();
        const providers = state.providers.map((p) => ({
          name: p.name,
          protocol: p.protocol,
          base_url: p.base_url,
          models: p.models,
          thinking_level: p.thinking_level,
          api_key: p._new_key || null,
        }));
        const newSecret = $("feishu_app_secret").value;
        return {
          // The first provider is the default used for new messages.
          active_provider: providers.length ? providers[0].name : "",
          thinking_level: state.thinking_level || null,
          providers,
          feishu: {
            app_id: $("feishu_app_id").value.trim(),
            app_secret: newSecret.length ? newSecret : null,
            mention_only: $("feishu_mention").checked,
          },
        };
      }

      async function load() {
        try {
          const res = await fetch("/api/settings");
          if (!res.ok) throw new Error("HTTP " + res.status);
          state = await res.json();
          render();
        } catch (e) {
          $("root").innerHTML = '<div class="loading" style="color:hsl(var(--danger))">Failed to load settings: ' +
            esc(e.message) + "</div>";
        }
      }

      async function save() {
        const btn = $("save");
        const payload = buildPayload();
        btn.disabled = true;
        toast("Saving…", "");
        try {
          const res = await fetch("/api/settings", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          const body = await res.json();
          if (!res.ok || !body.ok) {
            toast(body.error || ("HTTP " + res.status), "err");
            return;
          }
          state = body.settings;
          render();
          if (body.feishu_restart_required) {
            toast("Saved. Restart the server to apply Feishu changes.", "warn");
          } else {
            toast("Saved. LLM changes apply on the next message.", "ok");
          }
        } catch (e) {
          toast("Save failed: " + e.message, "err");
        } finally {
          btn.disabled = false;
        }
      }

      $("save").addEventListener("click", save);
      $("addprovider").addEventListener("click", () => {
        syncFromDom();
        state.providers.push({
          name: "new-provider", protocol: state.protocols[0], api_key_set: false,
          api_key_hint: "", base_url: "", models: [], thinking_level: null,
        });
        render();
      });

      load();
    </script>
  </body>
</html>
